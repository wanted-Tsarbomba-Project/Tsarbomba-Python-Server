# ④ 챗봇 EC2 스택 — chatbot(앱) + promtail(로그 사이드카)
# 실행(EC2): cd /opt/chatbot && export ECR_REGISTRY=<...> && docker compose up -d
# ECR_REGISTRY 는 GitHub Actions ssh 스텝에서 export 해서 주입한다.
services:
  chatbot:
    image: ${ECR_REGISTRY}/team05/python:latest
    container_name: lms-chatbot
    env_file: .env                 # GEMINI_API_KEY, db_* 등 (EC2에만 존재)
    ports:
      - "8000:8000"                # SG: ②Spring·①FE(사설망)만 허용 권장
    volumes:
      - learning-chroma:/app/.chroma
    restart: unless-stopped
    logging:                       # 로그 폭주 방지 (promtail이 이 파일을 tail)
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: lms-chatbot-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  learning-chroma:
