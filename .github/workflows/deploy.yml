name: Deploy ChatBot (④ EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

# 동시 배포 방지
concurrency:
  group: deploy-chatbot-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: team05/python
  S3_PREFIX: s3://team05-01-deploy-0708-635249349258-ap-northeast-2-an/chatbot/
  EC2_NAME_TAG: team05-01-python        # ⚠️ 파이썬 박스의 실제 Name 태그와 일치해야 함

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write             # OIDC 토큰 발급(키리스 핵심)
      contents: read
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: AWS 자격증명 (OIDC, team05-github-actions)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::635249349258:role/team05-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드 & ECR 푸시
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$REGISTRY/$ECR_REPO:$TAG" -t "$REGISTRY/$ECR_REPO:latest" .
          docker push "$REGISTRY/$ECR_REPO:$TAG"
          docker push "$REGISTRY/$ECR_REPO:latest"

      - name: .env 조립 (GitHub Secrets/Variables → 파일, 값은 로그 마스킹)
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REASON_MODEL: ${{ vars.GEMINI_REASON_MODEL || vars.GEMINI_MODEL }}
          LEARNING_EMBEDDING_TIMEOUT_MS: ${{ vars.LEARNING_EMBEDDING_TIMEOUT_MS }}
          DEFAULT_MAX_LENGTH: ${{ vars.DEFAULT_MAX_LENGTH }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USERNAME: ${{ vars.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SPRING_BASE_URL: ${{ vars.SPRING_BASE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          : > deploy.env
          for k in ECR_REGISTRY GEMINI_API_KEY GEMINI_MODEL GEMINI_REASON_MODEL \
                   LEARNING_EMBEDDING_TIMEOUT_MS DEFAULT_MAX_LENGTH \
                   DB_HOST DB_PORT DB_NAME DB_USERNAME DB_PASSWORD \
                   SPRING_BASE_URL INTERNAL_API_TOKEN; do
            v="${!k}"
            [ -n "$v" ] && printf '%s=%s\n' "$k" "$v" >> deploy.env
          done

      - name: 배포자산 + .env S3 업로드 (SSE)
        run: |
          set -euo pipefail
          aws s3 sync deploy/ "$S3_PREFIX" --exclude '.env.example'
          aws s3 cp deploy.env "${S3_PREFIX}.env" --sse AES256

      - name: ④ EC2에서 받아 기동 (SSM send-command — 시크릿 없음)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$EC2_NAME_TAG" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          echo "대상 인스턴스: $INSTANCE_ID"
          if [ -z "$INSTANCE_ID" ]; then echo "running 인스턴스 없음"; exit 1; fi

          # EC2 명령: S3에서 .env·compose 받기 → ECR 로그인 → Chroma 동기화 → compose up → 헬스체크
          # 기존 chatbot은 계속 요청을 처리하고, 쓰기 작업은 일회성 ingestion 컨테이너 하나만 수행한다.
          # ingestion이 실패하면 set -e로 배포만 중단되므로 기존 chatbot은 영향 없이 계속 실행된다.
          cat > params.json <<EOF
          {"commands":[
            "set -e",
            "export ECR_REGISTRY=$REGISTRY",
            "mkdir -p /opt/chatbot",
            "aws s3 sync $S3_PREFIX /opt/chatbot",
            "cd /opt/chatbot",
            "chmod 600 .env 2>/dev/null || true",
            "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY",
            "docker compose pull",
            "docker compose run --rm --no-deps chatbot python -m ingestion.run_ingest",
            "docker compose up -d",
            "echo '준비 상태 확인: localhost:8000/ready 대기...'",
            "for i in \$(seq 1 30); do curl -fs -o /dev/null http://localhost:8000/ready && { echo 'OK: Chroma ready'; break; }; [ \$i -eq 30 ] && { echo 'FAIL: 60초 후에도 Chroma가 준비되지 않음'; docker compose logs --tail 50; exit 1; }; sleep 2; done",
            "docker image prune -f"
          ]}
          EOF

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy chatbot ${{ github.sha }}" \
            --timeout-seconds 600 \
            --parameters file://params.json \
            --query "Command.CommandId" --output text)
          echo "CommandId: $CMD_ID"

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          echo "===== EC2 표준 출력 ====="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)
          echo "최종 상태: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "===== EC2 표준 에러 ====="
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

      - name: S3 시크릿 정리 (at-rest 제거)
        if: always()
        run: aws s3 rm "${S3_PREFIX}.env" || true
