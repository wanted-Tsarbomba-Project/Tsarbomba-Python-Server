name: Secret Scan

on:
  pull_request:
    branches:
      - develop
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR에 포함된 커밋만 검사
      - name: Scan pull request commits
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git \
            --redact \
            --verbose \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            /repo

      # Actions 화면에서 수동 실행하면 저장소 전체 기록 검사
      - name: Scan full repository
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git \
            --redact \
            --verbose \
            /repo
